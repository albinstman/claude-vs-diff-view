name: Publish extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the vsix to the GitHub release
      id-token: write # OIDC token for Entra ID (workload identity federation)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Check tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) != tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Package
        run: npx vsce package

      # Preferred: Entra ID via workload identity federation (no long-lived
      # secrets; Azure DevOps global PATs retire 2026-12-01).
      - name: Azure login (Entra ID)
        if: vars.AZURE_CLIENT_ID != ''
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Publish to VS Code Marketplace (Entra ID)
        if: vars.AZURE_CLIENT_ID != ''
        run: npx vsce publish --packagePath *.vsix --azure-credential

      # Fallback: classic PAT (works until the 2026-12-01 retirement).
      - name: Publish to VS Code Marketplace (PAT)
        if: vars.AZURE_CLIENT_ID == ''
        run: npx vsce publish --packagePath *.vsix -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Attach vsix to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create "$GITHUB_REF_NAME" *.vsix --title "$GITHUB_REF_NAME" --generate-notes || gh release upload "$GITHUB_REF_NAME" *.vsix
        env:
          GH_TOKEN: ${{ github.token }}
