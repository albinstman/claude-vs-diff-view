name: Release vsix

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag + release with the vsix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Check whether this version is already released
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "v$VERSION already released — skipping"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Package
        if: steps.version.outputs.released == 'false'
        run: npx vsce package

      - name: Create release v${{ steps.version.outputs.version }}
        if: steps.version.outputs.released == 'false'
        run: gh release create "v$VERSION" *.vsix --title "v$VERSION" --generate-notes --target "$GITHUB_SHA"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
